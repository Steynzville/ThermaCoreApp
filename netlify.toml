[build]
  publish = "dist"
  command = "npm install -g pnpm@10.4.1 && pnpm install --frozen-lockfile && pnpm run build"

[build.environment]
  NODE_VERSION = "20.18.0"
  COREPACK_ENABLE_STRICT = "0"
  COREPACK_ENABLE_DOWNLOAD_PROMPT = "0"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
