name: Router Sanity Test

on:
  workflow_dispatch:

jobs:
  test-router:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Run router sanity test
        run: |
          echo "=== Running Router Sanity Test ==="
          pnpm vitest run src/tests/RouterSanity.test.jsx --reporter=verbose
          echo "=== Test Complete ==="
