name: CI Main - Backend Tests

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  SECRET_KEY: dummy-test-secret-key-123-for-github-actions
  JWT_SECRET_KEY: dummy-jwt-secret-key-456-for-github-actions
  FLASK_ENV: test
  FLASK_APP: app.py
  DATABASE_URL: postgresql://thermacore_user:thermacore_pass@db:5432/thermacore
  MQTT_CERT_PATH: /dummy/path/to/cert.pem
  MQTT_KEY_PATH: /dummy/path/to/key.pem
  MQTT_CA_PATH: /dummy/path/to/ca.pem

jobs:
  backend-tests:
    name: Backend Tests with Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js (for any Node-based tooling)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install PyYAML
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:buildx-stable-1
        continue-on-error: true

      - name: Set up Docker Compose
        run: |
          sudo systemctl start docker
          docker --version
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.29.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version

      - name: Fix Locust Version
        run: |
          cd backend
          if grep -q "locust==2.35.0" requirements.txt; then
            sed -i 's/locust==2.35.0/locust==2.20.1/' requirements.txt
          fi

      - name: Create CI Docker Compose
        run: |
          docker-compose config > docker-compose.ci.yml
          python3 -c "
          import yaml
          with open('docker-compose.ci.yml', 'r') as f:
              config = yaml.safe_load(f)
          if 'services' in config and 'frontend' in config['services']:
              del config['services']['frontend']
          with open('docker-compose.ci.yml', 'w') as f:
              yaml.dump(config, f)
          "

      - name: Build and Start Services
        run: |
          SERVICES=$(docker-compose -f docker-compose.ci.yml config --services)
          if echo "$SERVICES" | grep -q "timescaledb"; then
            DB_SERVICE="timescaledb"
          elif echo "$SERVICES" | grep -q "db"; then
            DB_SERVICE="db"
          else
            DB_SERVICE="postgres"
          fi
          echo "DB_SERVICE=$DB_SERVICE" >> $GITHUB_ENV
          
          docker-compose -f docker-compose.ci.yml build $DB_SERVICE backend
          docker-compose -f docker-compose.ci.yml up -d $DB_SERVICE
          sleep 30

      - name: Initialize Test Database
        run: |
          docker-compose -f docker-compose.ci.yml exec -T $DB_SERVICE psql -U postgres -c "DROP DATABASE IF EXISTS thermacore;" || true
          docker-compose -f docker-compose.ci.yml exec -T $DB_SERVICE psql -U postgres -c "DROP USER IF EXISTS thermacore_user;" || true
          docker-compose -f docker-compose.ci.yml exec -T $DB_SERVICE psql -U postgres -c "CREATE USER thermacore_user WITH PASSWORD 'thermacore_pass';" || true
          docker-compose -f docker-compose.ci.yml exec -T $DB_SERVICE psql -U postgres -c "CREATE DATABASE thermacore OWNER thermacore_user;" || true
          docker-compose -f docker-compose.ci.yml exec -T $DB_SERVICE psql -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE thermacore TO thermacore_user;" || true

      - name: Run Backend Tests with Coverage
        run: |
          echo "🧪 Running backend tests with coverage..."
          docker-compose -f docker-compose.ci.yml run --rm backend python -m pytest -v --tb=short --cov=app --cov-report=json --cov-report=term --cov-report=term-missing --cov-fail-under=60

      - name: 📊 Display Coverage Summary
        if: always()
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════"
          echo "                   📊 BACKEND COVERAGE                    "
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          
          if [ -f "backend/coverage.json" ]; then
            # Write Python script to file to avoid shell parsing
            echo 'import json' > /tmp/backend_coverage_script.py
            echo 'try:' >> /tmp/backend_coverage_script.py
            echo '    with open("backend/coverage.json", "r") as f:' >> /tmp/backend_coverage_script.py
            echo '        data = json.load(f)' >> /tmp/backend_coverage_script.py
            echo '    coverage = data.get("totals", {}).get("percent_covered", 0)' >> /tmp/backend_coverage_script.py
            echo '    statements = data.get("totals", {}).get("num_statements", 0)' >> /tmp/backend_coverage_script.py
            echo '    covered = data.get("totals", {}).get("covered_statements", 0)' >> /tmp/backend_coverage_script.py
            echo '    missing = data.get("totals", {}).get("missed_statements", 0)' >> /tmp/backend_coverage_script.py
            echo '    print("  📈 Total Coverage: {:.2f}%".format(coverage))' >> /tmp/backend_coverage_script.py
            echo '    print("  📝 Statements:     {}".format(statements))' >> /tmp/backend_coverage_script.py
            echo '    print("  ✅ Covered:        {}".format(covered))' >> /tmp/backend_coverage_script.py
            echo '    print("  ❌ Missing:       {}".format(missing))' >> /tmp/backend_coverage_script.py
            echo '    print("")' >> /tmp/backend_coverage_script.py
            echo '    # Color coding based on coverage percentage' >> /tmp/backend_coverage_script.py
            echo '    if coverage >= 80:' >> /tmp/backend_coverage_script.py
            echo '        print("  🟢 EXCELLENT! Coverage is above 80%")' >> /tmp/backend_coverage_script.py
            echo '    elif coverage >= 60:' >> /tmp/backend_coverage_script.py
            echo '        print("  🟡 Good! Coverage is above 60%")' >> /tmp/backend_coverage_script.py
            echo '    elif coverage >= 40:' >> /tmp/backend_coverage_script.py
            echo '        print("  🟠 Fair - Consider improving coverage")' >> /tmp/backend_coverage_script.py
            echo '    else:' >> /tmp/backend_coverage_script.py
            echo '        print("  🔴 Low coverage - Please add more tests")' >> /tmp/backend_coverage_script.py
            echo '    print("")' >> /tmp/backend_coverage_script.py
            echo '    print("═══════════════════════════════════════════════════════════")' >> /tmp/backend_coverage_script.py
            echo '    print("COVERAGE_PCT={:.2f}".format(coverage))' >> /tmp/backend_coverage_script.py
            echo 'except Exception as e:' >> /tmp/backend_coverage_script.py
            echo '    print("Error:", e)' >> /tmp/backend_coverage_script.py
            echo '    print("COVERAGE_PCT=0.00")' >> /tmp/backend_coverage_script.py
            
            # Run the Python script
            python3 /tmp/backend_coverage_script.py
            
          else
            echo "  ❌ No coverage.json found"
            echo "═══════════════════════════════════════════════════════════"
          fi

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage.json
          retention-days: 14

      - name: Stop Services
        if: always()
        run: |
          docker-compose -f docker-compose.ci.yml down --remove-orphans --timeout 30 || true
          rm -f docker-compose.ci.yml || true
