name: Debug UserUnitDetails

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  debug-user-unit-details:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ONLY UserUnitDetails
        env:
          CI: "true"
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          echo "=================================================="
          echo "Running ONLY:"
          echo "src/tests/UserUnitDetails.test.jsx"
          echo "=================================================="

          pnpm vitest run \
            src/tests/UserUnitDetails.test.jsx \
            --reporter=verbose \
            --runInBand \
            --logHeapUsage

          EXIT_CODE=$?

          echo ""
          echo "Vitest exit code: $EXIT_CODE"

          exit $EXIT_CODE

      - name: Cleanup
        if: always()
        run: |
          pkill -9 node || true
          echo "Cleanup complete."
