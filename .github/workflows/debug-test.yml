name: Debug SCADA Test

on:
  push:
    branches:
      - main # Or your specific branch
  workflow_dispatch: # This allows the manual "Run workflow" button

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install

      - name: Run Vitest
        run: npx vitest run src/tests/scadaFixtures.test.js
