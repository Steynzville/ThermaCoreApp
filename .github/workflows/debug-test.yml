name: Isolate Hanging Test

on:
  workflow_dispatch:

jobs:
  isolate:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        testfile:
          - src/tests/ProtocolWizard.test.jsx
          - src/tests/ProcessFlowDiagram.test.jsx
          - src/tests/Dashboard.test.jsx
          - src/tests/SystemHealth.test.jsx
          - src/tests/HistoryView.test.jsx
          - src/tests/GridView.test.jsx
          - src/tests/chart.test.jsx
          - src/tests/MultiTimeframeTrendChart.test.jsx
          - src/tests/RealtimeScadaDashboard.test.jsx
          - src/tests/Settings.test.jsx
          - src/tests/AdminPanel.validation.test.jsx
          - src/tests/IndustrialGauge.test.jsx
          - src/tests/NotificationBell.test.jsx
          - src/tests/MultiProtocolManager.enhanced.test.jsx
          - src/components/RemoteControl.test.jsx
          - src/tests/AdminPanel.test.jsx
          - src/tests/AlarmsView.test.jsx
          - src/tests/UnitPerformance.test.jsx
          - src/tests/UnitSummary.test.jsx
          - src/tests/EnhancedStatusDial.test.jsx
          - src/tests/VitalSignGraph.test.jsx
          - src/tests/ReportsView.test.jsx
          - src/tests/AlertsView.test.jsx
          - src/tests/SideNavigation.test.jsx
          - src/tests/ReportConfigurator.test.jsx
          - src/tests/UserRegistrationForm.test.jsx
          - src/components/PasswordResetRequest.test.jsx
          - src/components/MobileNavigation.test.jsx
          - src/tests/PerformanceDashboard.test.jsx
          - src/tests/LoginScreen.test.jsx
          - src/components/UserApprovalPanel.test.jsx
          - src/pages/Dashboard.test.jsx
          - src/tests/AdminPanel.userCreation.test.jsx
          - src/pages/DocumentsPage.test.jsx
          - src/components/StatusDial.test.jsx
          - src/components/ViewAnalytics.test.jsx
          - src/components/AdminPanel.test.jsx
          - src/tests/DeviceStatusDashboard.test.jsx
          - src/tests/AdvancedAnalyticsDashboard.test.jsx

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run ${{ matrix.testfile }}
        run: |
          echo "=========================================="
          echo "Running ${{ matrix.testfile }}"
          echo "=========================================="

          timeout 120s npx vitest run "${{ matrix.testfile }}" \
            --reporter=verbose \
            --runInBand

          EXIT_CODE=$?

          echo ""
          echo "Exit code: $EXIT_CODE"

          if [ "$EXIT_CODE" = "124" ]; then
            echo "❌ THIS TEST HUNG"
            exit 1
          fi
