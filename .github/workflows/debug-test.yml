name: Debug Hanging Test

permissions:
  contents: read
  pull-requests: write
  checks: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  debug-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Frontend Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run each test file individually
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          CI: "true"
        shell: bash
        run: |
          set +e

          echo "========================================"
          echo "Finding all test files..."
          echo "========================================"

          mapfile -t TEST_FILES < <(
            find src \
              \( -name "*.test.js" -o -name "*.test.jsx" \) \
              | sort
          )

          echo "Found ${#TEST_FILES[@]} test files."

          FAILED=0

          for TEST in "${TEST_FILES[@]}"; do
            echo ""
            echo "============================================================"
            echo "RUNNING: $TEST"
            echo "============================================================"

            timeout 180s pnpm vitest run "$TEST" \
              --pool=forks \
              --poolOptions.forks.singleFork=true \
              --poolOptions.forks.maxForks=1 \
              --reporter=verbose \
              --testTimeout=60000 \
              --logHeapUsage

            EXIT_CODE=$?

            if [ "$EXIT_CODE" -eq 124 ]; then
              echo ""
              echo "############################################"
              echo "HANG DETECTED"
              echo "Test file:"
              echo "$TEST"
              echo "############################################"
              exit 1
            fi

            if [ "$EXIT_CODE" -ne 0 ]; then
              echo ""
              echo "FAILED: $TEST (exit code $EXIT_CODE)"
              FAILED=1
            else
              echo "PASSED: $TEST"
            fi

            pkill -9 node || true
            sleep 2
          done

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "Some test files failed, but none hung."
            exit 1
          fi

          echo ""
          echo "SUCCESS: Every test file exited cleanly."

      - name: Final Cleanup
        if: always()
        run: |
          pkill -9 node || true
          echo "Cleanup complete."

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7
