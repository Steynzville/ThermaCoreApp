name: Debug Granular Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  granular-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: \( {{ runner.os }}-pnpm-store- \){{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Granular Test Run
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          echo "🔍 Granular debugging Batch 3..."
          
          # Test one file at a time from the late group
          FILES=(
            "src/tests/scadaFixtures.test.js"
            "src/tests/ProtocolWizard.test.jsx"
            "src/tests/ProcessFlowDiagram.test.jsx"
            "src/tests/Dashboard.test.jsx"
            "src/tests/SystemHealth.test.jsx"
            "src/tests/HistoryView.test.jsx"
            "src/tests/GridView.test.jsx"
            "src/tests/chart.test.jsx"
          )
          
          for file in "${FILES[@]}"; do
            echo "=== Testing $file ==="
            pnpm vitest run "$file" --pool=forks --reporter=verbose --testTimeout=45000 || echo "Failed or hung on $file"
            sleep 3
          done
          
          echo "Granular run completed."
