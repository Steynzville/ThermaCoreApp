name: Debug SCADA Fixtures Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  debug-scada:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: \( {{ runner.os }}-pnpm-store- \){{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Frontend Dependencies
        run: |
          echo "📦 Installing frontend dependencies..."
          pnpm install --frozen-lockfile

      - name: Run ONLY scadaFixtures test with diagnostics
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          CI: "true"
        run: |
          echo "🔍 Debugging scadaFixtures.test.js"
          echo "Node: $(node --version) | pnpm: $(pnpm --version)"
          
          TEST_FILE="src/tests/scadaFixtures.test.js"
          
          if [ ! -f "$TEST_FILE" ]; then
            echo "❌ Test file not found: $TEST_FILE"
            ls -la src/tests/ 2>/dev/null | grep -i scada || echo "No scada files found"
            exit 1
          fi
          
          echo "✅ Found test file. Running..."
          
          npx vitest run "$TEST_FILE" \
            --pool=forks \
            --reporter=verbose \
            --reporter=hanging-process \
            --testTimeout=30000 \
            --logHeapUsage || echo "Command exited with code $?"
