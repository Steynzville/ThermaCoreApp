name: Debug SCADA Fixtures Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  debug-full:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: \( {{ runner.os }}-pnpm-store- \){{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Frontend Dependencies
        run: |
          echo "📦 Installing frontend dependencies..."
          pnpm install --frozen-lockfile

      - name: Run Full Test Suite with Diagnostics
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          CI: "true"
        run: |
          echo "📊 Running FULL test suite (simulating main workflow)..."
          
          timeout 420 pnpm vitest run \
            --pool=forks \
            --poolOptions.forks.singleFork=true \
            --reporter=verbose \
            --reporter=hanging-process \
            --testTimeout=30000 \
            --logHeapUsage \
            --coverage \
            --coverage.reporter=text \
            --coverage.reporter=json-summary \
            --testNamePattern="^(?!.*AdminPanel User Creation Form).*" || {
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 124 ]; then
                echo "⏰ Tests timed out after 7 minutes"
                echo "This confirms the hang happens during full suite teardown"
              fi
              exit $EXIT_CODE
            }
