name: Debug Test Batches

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: \( {{ runner.os }}-pnpm-store- \){{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Tests in Batches to Find Hang
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          echo "🔍 Running tests in batches to isolate the hanging test..."
          
          run_batch() {
            echo "=== Batch $1 ==="
            pnpm vitest run $2 --pool=forks --reporter=verbose --testTimeout=60000 || echo "Batch $1 completed or failed"
            sleep 2
          }
          
          run_batch 1 "src/tests/[A-M]*.test.* src/components/*.test.* src/pages/*.test.*"
          run_batch 2 "src/hooks/*.test.* src/context/*.test.* src/services/*.test.* src/utils/*.test.*"
          run_batch 3 "src/tests/[N-Z]*.test.* src/tests/ui/*.test.* src/tests/*Fixture*.test.* src/tests/*scada*.test.*"
