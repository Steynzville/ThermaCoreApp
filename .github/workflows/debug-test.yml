name: Debug Test Batches

on:
  workflow_dispatch:

jobs:
  test-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: \( {{ runner.os }}-pnpm-store- \){{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Tests in Batches
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          echo "Testing in batches to find the hanging test..."
          
          # Batch 1: Early tests
          echo "=== Batch 1 ==="
          pnpm vitest run "src/tests/*.test.*" "src/components/*.test.*" --pool=forks --reporter=verbose || echo "Batch 1 done"
          
          # Batch 2: Middle
          echo "=== Batch 2 ==="
          pnpm vitest run "src/hooks/*.test.*" "src/context/*.test.*" "src/services/*.test.*" --pool=forks --reporter=verbose || echo "Batch 2 done"
          
          # Batch 3: Late tests
          echo "=== Batch 3 ==="
          pnpm vitest run "src/tests/ui/*.test.*" "src/tests/*Fixtures*.test.*" --pool=forks --reporter=verbose || echo "Batch 3 done"
