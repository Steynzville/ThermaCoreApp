name: Debug Hanging Test

permissions:
  contents: read
  pull-requests: write
  checks: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  debug-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Frontend Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run scadaFixtures only
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          CI: "true"
        run: |
          echo "=================================================="
          echo "Running ONLY:"
          echo "src/tests/scadaFixtures.test.js"
          echo "=================================================="

          timeout 180s pnpm vitest run \
            src/tests/scadaFixtures.test.js \
            --pool=forks \
            --poolOptions.forks.singleFork=true \
            --poolOptions.forks.maxForks=1 \
            --reporter=verbose \
            --testTimeout=60000 \
            --logHeapUsage

          EXIT_CODE=$?

          echo ""
          echo "Vitest exit code: $EXIT_CODE"

          if [ "$EXIT_CODE" = "124" ]; then
            echo ""
            echo "❌ TEST HUNG"
            exit 1
          fi

          exit $EXIT_CODE

      - name: Final Cleanup
        if: always()
        run: |
          pkill -9 node || true
          echo "Cleanup complete."

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7
