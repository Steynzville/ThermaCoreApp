name: Debug SCADA Fixtures Test

on:
  workflow_dispatch:

jobs:
  debug-scada:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ONLY scadaFixtures test (with full diagnostics)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          CI: "true"
        run: |
          echo "🔍 Starting SCADA Fixtures debug run..."
          echo "Node version: $(node --version)"
          echo "PNPM version: $(pnpm --version)"
          
          TEST_FILE="src/tests/scadaFixtures.test.js"
          
          echo "📁 Checking test file exists..."
          ls -la "$TEST_FILE" || echo "⚠️ Test file not found at expected path!"
          
          echo "🧪 Running test with diagnostics..."
          
          # Main diagnostic run
          npx vitest run "$TEST_FILE" \
            --pool=forks \
            --reporter=verbose \
            --reporter=hanging-process \
            --testTimeout=30000 \
            --logHeapUsage \
            --no-threads || echo "Test exited with code $?"
          
          echo "----------------------------------------"
          echo "🧪 Alternative run without isolation/coverage (if above hangs)"
          echo "----------------------------------------"
          
          # Alternative: lighter run
          timeout 60s npx vitest run "$TEST_FILE" \
            --pool=forks \
            --coverage=false \
            --isolate=false \
            --reporter=verbose || echo "Light run exited with code $?"
          
          echo "✅ Debug workflow completed"
