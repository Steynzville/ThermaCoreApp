name: Debug SCADA Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Correctly install pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Run Vitest with Timeout
        # Adding --testTimeout ensures the process exits if it hangs
        run: npx vitest run src/tests/scadaFixtures.test.js --testTimeout=30000
