name: Backend Coverage Report

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
      - Demo-App
  pull_request:
    branches:
      - main
      - Demo-App

env:
  SECRET_KEY: dummy-test-secret-key-123-for-github-actions
  JWT_SECRET_KEY: dummy-jwt-secret-key-456-for-github-actions
  FLASK_ENV: test
  FLASK_APP: app.py
  DATABASE_URL: postgresql://thermacore_user:thermacore_pass@db:5432/thermacore
  MQTT_CERT_PATH: /dummy/path/to/cert.pem
  MQTT_KEY_PATH: /dummy/path/to/key.pem
  MQTT_CA_PATH: /dummy/path/to/ca.pem

jobs:
  backend-tests:
    name: Backend Tests with Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install PyYAML
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:buildx-stable-1
        continue-on-error: true

      - name: Set up Docker Compose
        run: |
          sudo systemctl start docker
          docker --version
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.29.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version

      - name: Fix Locust Version
        run: |
          cd backend
          if grep -q "locust==2.35.0" requirements.txt; then
            sed -i 's/locust==2.35.0/locust==2.20.1/' requirements.txt
          fi

      - name: Remove Old Coverage Files
        run: |
          echo "🧹 Cleaning up old coverage files to avoid confusion..."
          rm -f backend/coverage.json backend/.coverage backend/coverage.xml
          rm -rf backend/htmlcov/
          echo "✅ Old coverage files removed"

      - name: Create CI Docker Compose
        run: |
          docker-compose config > docker-compose.ci.yml
          python3 -c "
          import yaml
          with open('docker-compose.ci.yml', 'r') as f:
              config = yaml.safe_load(f)
          if 'services' in config and 'frontend' in config['services']:
              del config['services']['frontend']
          with open('docker-compose.ci.yml', 'w') as f:
              yaml.dump(config, f)
          "

      - name: Build and Start Services
        run: |
          SERVICES=$(docker-compose -f docker-compose.ci.yml config --services)
          if echo "$SERVICES" | grep -q "timescaledb"; then
            DB_SERVICE="timescaledb"
          elif echo "$SERVICES" | grep -q "db"; then
            DB_SERVICE="db"
          else
            DB_SERVICE="postgres"
          fi
          echo "DB_SERVICE=$DB_SERVICE" >> $GITHUB_ENV
          
          docker-compose -f docker-compose.ci.yml build $DB_SERVICE backend
          docker-compose -f docker-compose.ci.yml up -d $DB_SERVICE
          sleep 30

      - name: Initialize Test Database
        run: |
          docker-compose -f docker-compose.ci.yml exec -T $DB_SERVICE psql -U postgres -c "DROP DATABASE IF EXISTS thermacore;" || true
          docker-compose -f docker-compose.ci.yml exec -T $DB_SERVICE psql -U postgres -c "DROP USER IF EXISTS thermacore_user;" || true
          docker-compose -f docker-compose.ci.yml exec -T $DB_SERVICE psql -U postgres -c "CREATE USER thermacore_user WITH PASSWORD 'thermacore_pass';" || true
          docker-compose -f docker-compose.ci.yml exec -T $DB_SERVICE psql -U postgres -c "CREATE DATABASE thermacore OWNER thermacore_user;" || true
          docker-compose -f docker-compose.ci.yml exec -T $DB_SERVICE psql -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE thermacore TO thermacore_user;" || true

      - name: Run Backend Tests with Coverage
        id: tests
        run: |
          echo "🧪 Running backend tests with coverage..."
          
          # Run tests with volume mount to persist coverage files
          # Mount $(pwd)/backend to /app so coverage files are written to host
          docker-compose -f docker-compose.ci.yml run --rm \
            -v $(pwd)/backend:/app \
            backend python -m pytest -v --tb=short \
            --cov=app \
            --cov-report=json \
            --cov-report=html \
            --cov-report=xml \
            --cov-report=term \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            --cov-branch \
            --cov-config=.coveragerc 2>&1 | tee coverage_output.txt
          
          # Verify coverage files were created
          echo "📁 Checking for coverage files..."
          ls -la backend/ | grep -E "(coverage|\.coverage|htmlcov)" || echo "⚠️ No coverage files found"
          
          if [ -f backend/coverage.json ]; then
            echo "✅ coverage.json found!"
            echo "📁 coverage.json timestamp: $(date -r backend/coverage.json)"
          else
            echo "⚠️ coverage.json not found - files may not have been written correctly"
          fi

      - name: Extract Coverage from Output
        id: coverage
        if: always()
        run: |
          echo "📊 Extracting coverage from test output..."
          
          # PRIMARY: Extract from pytest output (most reliable)
          COVERAGE=$(grep -oP 'Total coverage: \K[0-9.]+' coverage_output.txt | tail -1 || echo "")
          
          # SECONDARY: If pytest output extraction failed, try the freshly generated coverage.json
          if [ -z "$COVERAGE" ] && [ -f backend/coverage.json ]; then
            echo "📁 Reading coverage from backend/coverage.json..."
            
            # Check if the file is from today (within the last 5 minutes)
            FILE_MTIME=$(stat -c %Y backend/coverage.json 2>/dev/null || echo "0")
            NOW=$(date +%s)
            AGE=$((NOW - FILE_MTIME))
            
            # Only read the file if it's less than 5 minutes old (fresh from this run)
            if [ $AGE -lt 300 ]; then
              COVERAGE=$(cat backend/coverage.json | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              # Use the current run's coverage data
              if 'totals' in data and 'percent_covered' in data['totals']:
                  print(data['totals']['percent_covered'])
              else:
                  print('')
          except Exception as e:
              print('')
          " 2>/dev/null || echo "")
              echo "📁 coverage.json is fresh (age: ${AGE}s)"
            else
              echo "⚠️ coverage.json is from $(date -r backend/coverage.json) - ignoring stale file (age: ${AGE}s)"
            fi
          fi
          
          # TERTIARY: If still no coverage, extract from the coverage summary in the output
          if [ -z "$COVERAGE" ]; then
            echo "🔍 Attempting to extract coverage from pytest summary..."
            COVERAGE=$(grep -oP 'TOTAL\s+\d+\s+\d+\s+\d+\s+\K[0-9.]+' coverage_output.txt | tail -1 || echo "")
          fi
          
          # FINAL FALLBACK: Use a safe default
          if [ -z "$COVERAGE" ]; then
            echo "⚠️ Could not extract coverage from any source, using 0"
            COVERAGE="0"
          fi
          
          # Store the coverage value for later steps
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV
          echo "COVERAGE_PERCENT=$COVERAGE%" >> $GITHUB_ENV
          echo "Total coverage extracted: $COVERAGE%"
          
          # Show the timestamp of the coverage file for debugging
          if [ -f backend/coverage.json ]; then
            FILE_DATE=$(date -r backend/coverage.json '+%Y-%m-%d %H:%M:%S')
            echo "📁 coverage.json timestamp: $FILE_DATE"
            # Verify it's from today
            FILE_DATE_SHORT=$(date -r backend/coverage.json +%Y-%m-%d)
            TODAY=$(date +%Y-%m-%d)
            if [ "$FILE_DATE_SHORT" != "$TODAY" ]; then
              echo "⚠️ WARNING: coverage.json is from $FILE_DATE_SHORT, not today ($TODAY)!"
              echo "⚠️ This suggests the old committed file was used instead of the fresh one."
            else
              echo "✅ coverage.json is from today ($FILE_DATE_SHORT)"
            fi
          fi

      - name: Display Coverage Summary
        if: always()
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "                   📊 BACKEND COVERAGE                   "
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          echo "  📈 Total Coverage: ${{ env.COVERAGE }}%"
          echo "  📁 Generated at:   $(date '+%Y-%m-%d %H:%M:%S')"
          echo ""
          if (( $(echo "${{ env.COVERAGE }} >= 80" | bc -l) )); then
            echo "  🟢 EXCELLENT! Coverage is above 80%"
          elif (( $(echo "${{ env.COVERAGE }} >= 60" | bc -l) )); then
            echo "  🟡 Good! Coverage is above 60%"
          elif (( $(echo "${{ env.COVERAGE }} >= 40" | bc -l) )); then
            echo "  🟠 Fair - Consider improving coverage"
          else
            echo "  🔴 Low coverage - Please add more tests"
          fi
          echo ""
          echo "═══════════════════════════════════════════════════════════"
          
          # Show coverage file info for debugging
          if [ -f backend/coverage.json ]; then
            FILE_SIZE=$(du -h backend/coverage.json | cut -f1)
            FILE_DATE=$(date -r backend/coverage.json '+%Y-%m-%d %H:%M:%S')
            echo ""
            echo "📁 Coverage file details:"
            echo "   Size: $FILE_SIZE"
            echo "   Modified: $FILE_DATE"
          else
            echo ""
            echo "⚠️ No coverage.json file found on the host!"
            echo "   Check that the volume mount is working correctly."
          fi

      - name: Upload Full Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: |
            backend/coverage.json
            backend/coverage.xml
            backend/htmlcov/
            backend/.coverage
          retention-days: 30
          if-no-files-found: warn

      - name: Stop Services
        if: always()
        run: |
          docker-compose -f docker-compose.ci.yml down --remove-orphans --timeout 30 || true
          rm -f docker-compose.ci.yml || true
