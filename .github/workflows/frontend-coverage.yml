name: Isolated Protocol WebSocket Test

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  isolated-test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install Frontend Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run only useProtocolWebSocket test (with low heap limit)
        env:
          NODE_OPTIONS: "--max-old-space-size=512"
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "     🧪 Running useProtocolWebSocket test in isolation    "
          echo "     📉 Heap limit: 512MB (crashes fast on infinite loop) "
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          
          pnpm vitest run src/tests/useProtocolWebSocket.test.js \
            --reporter=verbose \
            --testTimeout=5000 \
            --pool=forks \
            --poolOptions.forks.singleFork=true \
            --no-coverage 2>&1 | tee test-output.txt
          
          EXIT_CODE=$?
          echo ""
          echo "═══════════════════════════════════════════════════════════"
          echo "  📊 Exit Code: $EXIT_CODE"
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          echo "📋 Last 50 lines of output:"
          echo "═══════════════════════════════════════════════════════════"
          tail -50 test-output.txt
          
          exit $EXIT_CODE
