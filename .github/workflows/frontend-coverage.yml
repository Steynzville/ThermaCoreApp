name: Debug SCADA Fixtures Test

on:
  workflow_dispatch:

jobs:
  debug-scada:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ONLY scadaFixtures test with diagnostics
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          CI: "true"
        run: |
          echo "🔍 Debugging scadaFixtures.test.js"
          echo "Node: $(node --version) | pnpm: $(pnpm --version)"
          
          TEST_FILE="src/tests/scadaFixtures.test.js"
          
          if [ ! -f "$TEST_FILE" ]; then
            echo "❌ Test file not found: $TEST_FILE"
            ls -la src/tests/ | grep -i scada || echo "No scada files found"
            exit 1
          fi
          
          echo "✅ Found test file. Running..."
          
          npx vitest run "$TEST_FILE" \
            --pool=forks \
            --reporter=verbose \
            --reporter=hanging-process \
            --testTimeout=30000 \
            --logHeapUsage || echo "Command exited with code $?"
