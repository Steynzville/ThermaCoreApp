name: Isolated Protocol WebSocket Test

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  isolated-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install Frontend Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run only useProtocolWebSocket test
        env:
          # Cap the heap well below the runner's default so a runaway
          # infinite-loop / infinite-render allocation OOMs in seconds
          # instead of climbing to ~4GB over ~2 minutes. A lower ceiling
          # also keeps GC pressure low enough that stdout actually gets a
          # chance to flush before the crash, so the last test name printed
          # in the log should be trustworthy this time.
          NODE_OPTIONS: "--max-old-space-size=512"
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "     🧪 Running useProtocolWebSocket test in isolation    "
          echo "     (heap capped at 512MB to surface OOM loops fast)      "
          echo "═══════════════════════════════════════════════════════════"
          echo ""

          pnpm vitest run src/tests/useProtocolWebSocket.test.js \
            --reporter=verbose \
            --testTimeout=5000 \
            --pool=forks \
            --poolOptions.forks.singleFork=true \
            --no-coverage

          EXIT_CODE=$?
          echo ""
          echo "═══════════════════════════════════════════════════════════"
          echo "  📊 Exit Code: $EXIT_CODE"
          echo "═══════════════════════════════════════════════════════════"

          exit $EXIT_CODE
