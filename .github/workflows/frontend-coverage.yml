name: Frontend Coverage Report
permissions:
  contents: read
  pull-requests: write
  checks: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  frontend-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Frontend Dependencies
        run: |
          echo "📦 Installing frontend dependencies..."
          pnpm install --frozen-lockfile

      - name: Run Coverage with Timeout
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          CI: "true"
        run: |
          echo "📊 Running frontend coverage..."
          # Run with timeout command to force exit after 5 minutes
          timeout 300 pnpm vitest run --pool=forks --poolOptions.forks.singleFork=true --coverage --coverage.reporter=text --coverage.reporter=json-summary --coverage.reportsDirectory=coverage --testNamePattern="^(?!.*AdminPanel User Creation Form).*" || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 124 ]; then
              echo "⚠️ Tests timed out after 5 minutes - checking for partial coverage"
              if [ -f coverage/coverage-summary.json ]; then
                echo "✅ Coverage files found, treating as success"
                exit 0
              fi
              echo "❌ No coverage files found after timeout"
              exit 1
            fi
            # Check if coverage files exist even on failure
            if [ -f coverage/coverage-summary.json ]; then
              echo "✅ Coverage files found despite test failures"
              exit 0
            fi
            exit $EXIT_CODE
          }

      - name: Wait for Coverage Generation
        if: always()
        run: |
          echo "⏳ Waiting for coverage files..."
          sleep 5
          ls -la coverage/ 2>/dev/null || echo "Coverage directory not found"

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: coverage/
          retention-days: 14

      - name: Display Coverage Summary
        if: always()
        run: |
          echo "=========================================="
          echo "📊 FRONTEND COVERAGE SUMMARY"
          echo "=========================================="
          if [ -f coverage/coverage-summary.json ]; then
            echo ""
            echo "📈 METRIC COVERAGE SUMMARY:"
            echo "------------------------"
            cat coverage/coverage-summary.json | jq -r '
              "Statements: " + (.total.statements.pct | tostring) + "% (" + (.total.statements.covered | tostring) + "/" + (.total.statements.total | tostring) + ")",
              "Branches:   " + (.total.branches.pct | tostring) + "% (" + (.total.branches.covered | tostring) + "/" + (.total.branches.total | tostring) + ")",
              "Functions:  " + (.total.functions.pct | tostring) + "% (" + (.total.functions.covered | tostring) + "/" + (.total.functions.total | tostring) + ")",
              "Lines:      " + (.total.lines.pct | tostring) + "% (" + (.total.lines.covered | tostring) + "/" + (.total.lines.total | tostring) + ")"
            ' || echo "Failed to parse coverage-summary.json"
            echo ""
            echo "Files with low coverage (<60%):"
            echo "------------------------------"
            cat coverage/coverage-summary.json | jq -r '
              . | to_entries[] | 
              select(.key != "total") | 
              select(.value.lines.pct < 60) |
              "  \(.key): \(.value.lines.pct)% lines"
            ' || echo "  No files under 60%"
          else
            echo "⚠️ No coverage data found"
            echo ""
            echo "Coverage directory contents:"
            ls -la coverage/ 2>/dev/null || echo "  No coverage directory"
            echo ""
            echo "Current directory contents:"
            ls -la 2>/dev/null | head -20
          fi

      - name: List Coverage Files
        if: always()
        run: |
          echo "📁 Coverage directory contents:"
          ls -la coverage/ 2>/dev/null || echo "No coverage directory"
