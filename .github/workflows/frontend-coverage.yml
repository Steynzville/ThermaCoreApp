name: Frontend Coverage Report
permissions:
  contents: read
  pull-requests: write
  checks: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  frontend-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Frontend Dependencies
        run: |
          echo "📦 Installing frontend dependencies..."
          pnpm install --frozen-lockfile

      - name: Run Coverage Directly
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          CI: "true"
        run: |
          echo "📊 Running frontend coverage directly via Vitest..."
          # Bypassing the test-wrapper script to eliminate parent-process deadlocks.
          # Explicitly adding --forceExit here to guarantee termination.
          pnpm vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary --coverage.reportsDirectory=coverage --forceExit

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: coverage/
          retention-days: 14

      - name: Display Coverage Summary
        if: always()
        run: |
          echo "📊 Frontend Coverage Report"
          echo "=========================="
          if [ -f coverage/coverage-summary.json ]; then
            echo ""
            echo "📈 METRIC COVERAGE SUMMARY:"
            echo "------------------------"
            
            jq -r '
              "Statements: " + (.total.statements.pct | tostring) + "% (" + (.total.statements.covered | tostring) + "/" + (.total.statements.total | tostring) + ")\n" +
              "Branches:   " + (.total.branches.pct | tostring) + "% (" + (.total.branches.covered | tostring) + "/" + (.total.branches.total | tostring) + ")\n" +
              "Functions:  " + (.total.functions.pct | tostring) + "% (" + (.total.functions.covered | tostring) + "/" + (.total.functions.total | tostring) + ")\n" +
              "Lines:      " + (.total.lines.pct | tostring) + "% (" + (.total.lines.covered | tostring) + "/" + (.total.lines.total | tostring) + ")"
            ' coverage/coverage-summary.json || echo "Failed to parse coverage-summary.json"
            
            echo ""
            echo "Full raw breakdown available in artifacts."
          elif [ -f coverage/coverage-final.json ]; then
            echo "Coverage summary json missing, but raw data available (coverage-final.json)"
          else
            echo "⚠️ No coverage data files found inside coverage/"
          fi

      - name: List Coverage Files
        if: always()
        run: |
          echo "📁 Coverage directory contents:"
          ls -la coverage/ || echo "No coverage directory"
