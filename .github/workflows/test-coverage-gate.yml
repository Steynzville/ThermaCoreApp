name: Test Coverage Quality Gate
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  SECRET_KEY: dummy-test-secret-key-123-for-github-actions
  JWT_SECRET_KEY: dummy-jwt-secret-key-456-for-github-actions
  FLASK_ENV: test
  FLASK_APP: app.py
  DATABASE_URL: postgresql://thermacore_user:thermacore_pass@db:5432/thermacore

jobs:
  test-coverage-gate:
    name: Test Coverage Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Frontend Dependencies
        run: pnpm install

      - name: Run Frontend Tests with Coverage
        run: |
          echo "🧪 Running frontend tests with coverage..."
          pnpm run test:coverage:frontend || {
            echo "❌ Frontend tests failed"
            exit 1
          }

      - name: Check Frontend Coverage
        run: |
          echo "📊 Checking frontend test coverage..."
          
          # Parse coverage from output or coverage file
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(node -e "
              const coverage = require('./coverage/coverage-summary.json');
              const total = coverage.total;
              const avg = (total.lines.pct + total.statements.pct + total.functions.pct + total.branches.pct) / 4;
              console.log(avg.toFixed(2));
            ")
            
            echo "Frontend coverage: $COVERAGE%"
            
            python - <<EOF
          import sys
          coverage = float("$COVERAGE" or "0")
          if coverage < 60:
              print(f"❌ Coverage Gate FAILED: Frontend coverage too low ({coverage}% < 60%)")
              sys.exit(1)
          print(f"✅ Frontend Coverage Gate PASSED ({coverage}%)")
          EOF
          else
            echo "⚠️  Coverage file not found, skipping check"
          fi

      - name: Set up Docker for Backend Tests
        uses: docker/setup-buildx-action@v3

      - name: Start Test Database
        run: |
          docker run -d \
            --name test-db \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=thermacore_test \
            -p 5432:5432 \
            postgres:14
          
          # Wait for database
          sleep 10

      - name: Run Backend Tests with Coverage
        run: |
          cd backend
          pip install -r requirements.txt
          
          echo "🧪 Running backend tests with coverage..."
          export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/thermacore_test
          pytest --cov=app --cov-report=json --cov-report=term --cov-report=term-missing --cov-fail-under=60 -v || {
            echo "❌ Backend tests failed"
            exit 1
          }

      - name: Check Backend Coverage
        run: |
          cd backend
          echo "📊 Checking backend test coverage..."
          
          if [ -f coverage.json ]; then
            COVERAGE=$(python - <<'EOF'
          import json
          with open('coverage.json', 'r') as f:
              data = json.load(f)
              print(f"{data['totals']['percent_covered']:.2f}")
          EOF
          )
            
            echo "Backend coverage: $COVERAGE%"
            echo "📊 Detailed coverage report above shows line-by-line coverage"
            
            # Use 60% as threshold for coverage enforcement
            python - <<EOF
          import sys
          coverage = float("$COVERAGE" or "0")
          if coverage < 60:
              print(f"❌ Coverage Gate FAILED: Backend coverage too low ({coverage}% < 60%)")
              sys.exit(1)
          print(f"✅ Backend Coverage Gate PASSED ({coverage}%)")
          print(f"ℹ️  Note: Backend coverage at {coverage}%")
          EOF
          else
            echo "⚠️  Coverage file not found, skipping check"
          fi

      - name: Stop Test Database
        if: always()
        run: |
          docker stop test-db || true
          docker rm test-db || true

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage/
            backend/coverage.json
            backend/.coverage
