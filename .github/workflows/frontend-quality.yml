name: Frontend Quality
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install Frontend Dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Type Checking
        run: |
          echo "🔍 Running TypeScript type checking..."
          pnpm type-check || echo "⚠️ Type checking skipped - JavaScript project"
      - name: Run Biome Format and Lint
        run: |
          echo "🎨 Running Biome formatting and linting..."
          pnpm biome check --write .
      - name: Verify Build
        run: |
          echo "🏗️ Verifying production build..."
          pnpm build
      - name: Run Tests (Pull Requests)
        if: github.event_name == 'pull_request'
        run: |
          echo "🧪 Running frontend tests (no coverage on PR to avoid OOM)..."
          pnpm test
      - name: Run Tests with Coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "🧪 Running frontend tests with coverage on main..."
          pnpm test:coverage -- --coverage.provider=v8 --maxWorkers=2
      - name: Display Coverage Summary
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "📊 ================================="
          echo "📊 FRONTEND COVERAGE REPORT"
          echo "📊 ================================="
          
          if [ -f "coverage/coverage-summary.json" ]; then
            COVERAGE_DATA=$(node -e "
              const coverage = require('./coverage/coverage-summary.json');
              const total = coverage.total;
              console.log('🎯 PRIMARY METRIC → Lines: ' + total.lines.pct + '%');
              console.log('---');
              console.log('📈 Statements: ' + total.statements.pct + '%');
              console.log('🔧 Functions: ' + total.functions.pct + '%'); 
              console.log('🌿 Branches: ' + total.branches.pct + '%');
              console.log('---');
            ")
            echo "$COVERAGE_DATA"
            
            # Extract line coverage for status
            LINE_COVERAGE=$(node -e "console.log(require('./coverage/coverage-summary.json').total.lines.pct)")
            echo "COVERAGE_PCT=$LINE_COVERAGE" >> $GITHUB_ENV
            echo "MAIN_COVERAGE=$LINE_COVERAGE" >> $GITHUB_ENV
            echo ""
            echo "✅ Frontend Coverage: ${LINE_COVERAGE}% (Lines)"
          elif [ -f "coverage/lcov.info" ]; then
            echo "📈 Line coverage from lcov:"
            grep -E "LF:|LH:" coverage/lcov.info | head -2
          else
            echo "⚠️  No coverage report found in expected location"
            echo "📁 Coverage directory contents:"
            find coverage/ -type f 2>/dev/null | head -10 || echo "No coverage directory found"
          fi
      - name: Upload Coverage Report
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: coverage/
