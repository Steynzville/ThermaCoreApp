name: Frontend Quality Checks
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Frontend Dependencies
        run: pnpm install

      - name: Run Frontend Type Checking
        run: |
          echo "🔍 Running TypeScript type checking (if configured)..."
          pnpm type-check || echo "⚠️ Type checking skipped - JavaScript project"

      - name: Run Biome Formatting and Lint
        run: pnpm biome check --write .

      - name: Run Frontend Build Verification
        run: pnpm build

      - name: Run Frontend Tests with Coverage
        run: pnpm test:coverage
