name: Frontend Quality
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install Frontend Dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Type Checking
        run: |
          echo "🔍 Running TypeScript type checking..."
          pnpm type-check || echo "⚠️ Type checking skipped - JavaScript project"
      - name: Run Biome Format and Lint
        run: |
          echo "🎨 Running Biome formatting and linting..."
          pnpm biome check --write .
      - name: Verify Build
        run: |
          echo "🏗️ Verifying production build..."
          pnpm build
      - name: Run Tests (Pull Requests)
        if: github.event_name == 'pull_request'
        run: |
          echo "🧪 Running frontend tests (no coverage on PR to avoid OOM)..."
          pnpm test
      - name: Run Tests with Coverage (Main Branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        timeout-minutes: 30
        run: |
          echo "🧪 Running frontend tests with coverage on main (Istanbul provider)..."
          pnpm test:coverage -- --coverage.provider=istanbul --coverage.reporter=text --coverage.reporter=json-summary --maxWorkers=8
      - name: Display Coverage Summary
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "📊 ================================="
          echo "📊 FRONTEND COVERAGE REPORT"
          echo "📊 ================================="
          echo ""
          
          if [ ! -d "coverage" ]; then
            echo "⚠️  No coverage directory found"
            exit 0
          fi
          
          echo "📁 Coverage files found:"
          find coverage/ -type f 2>/dev/null | head -15 || echo "No files in coverage directory"
          echo ""
          
          if [ -f "coverage/coverage-summary.json" ]; then
            echo "✅ Coverage summary file found - processing..."
            COVERAGE_DATA=$(node -e "
              try {
                const coverage = require('./coverage/coverage-summary.json');
                const total = coverage.total;
                console.log('🎯 PRIMARY METRIC → Lines: ' + total.lines.pct + '%');
                console.log('---');
                console.log('📈 Statements: ' + total.statements.pct + '%');
                console.log('🔧 Functions: ' + total.functions.pct + '%'); 
                console.log('🌿 Branches: ' + total.branches.pct + '%');
                console.log('---');
              } catch (e) {
                console.log('Error parsing coverage: ' + e.message);
                process.exit(1);
              }
            " 2>&1 || true)
            echo "$COVERAGE_DATA"
            
            LINE_COVERAGE=$(node -e "
              try {
                console.log(require('./coverage/coverage-summary.json').total.lines.pct);
              } catch (e) {
                console.log('0');
              }
            " 2>&1)
            echo ""
            echo "✅ Frontend Coverage: ${LINE_COVERAGE}% (Lines)"
          elif [ -f "coverage/lcov.info" ]; then
            echo "📈 Line coverage from lcov:"
            grep -E "LF:|LH:" coverage/lcov.info | head -2
          else
            echo "⚠️  No coverage-summary.json or lcov.info found"
          fi
      - name: Upload Coverage Report
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: coverage/
