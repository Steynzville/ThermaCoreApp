name: Apply Ruff Auto-Fixes

on:
  push:
    branches:
      - Demo-App
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Demo-App
          
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Ruff
        run: pip install ruff
        
      - name: Apply fixes
        working-directory: backend
        run: |
          ruff check --fix . || true
          ruff format . || true
          
      - name: Commit changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add backend/ || true
          git diff --staged --quiet || git commit -m "Apply Ruff auto-fixes [skip ci]"
          git push origin Demo-App || true
