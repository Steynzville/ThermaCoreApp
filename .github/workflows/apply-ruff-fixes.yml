name: Apply Ruff Auto-Fixes

on:
  workflow_dispatch:

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Ruff
        run: pip install ruff
        
      - name: Apply fixes
        run: |
          cd backend
          ruff check --fix . || true
          ruff format . || true
          
      - name: Commit changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add backend/ || true
          git diff --cached --quiet || git commit -m "Apply Ruff auto-fixes [skip ci]"
          git push || true
