[tool.ruff]
line-length = 100
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    "venv",
    "env",
    ".venv",
    "migrations",
]

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "C", "B", "Q", "RUF",
]
ignore = [
    "PLC0415",
    "TRY401",
    "TRY301",
    "COM812",
    "Q000",
    "W293",
    "PLR0912",
    "PLR0913",
    "PLR0915",
    "PERF203",
    "PTH118",
    "DTZ001",
    "DTZ003",
    "DTZ005",
    "F841",
    "B007",
    "SIM102",
    "SIM105",
    "G003",
    "T201",
    "PT003",
    "PT017",
    "ERA001",
    "RUF059",
    "RUF043",
    "F401",
    "B017",
    "SIM103",
    "PLW2901",
    "PLR1722",
    "PLW1508",
    "PLC0206",
    "ARG005",
    "PLR0402",
    "TRY201",
    "TRY300",
    "B028",
    "DTZ007",
    "DTZ011",
    "F403",
    "F811",
    "F821",
    "N806",
    "N818",
    "PERF401",
    "PIE810",
    "PLR0913",
